
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.dash { padding: 1.25rem 0; }
.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; }
.metric-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); }
.metric-sub { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; }
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
.charts-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.card-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1rem; }
.filter-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 12px; color: var(--color-text-secondary); }
.pill { font-size: 12px; padding: 4px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; cursor: pointer; background: transparent; color: var(--color-text-secondary); transition: all 0.12s; }
.pill.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; font-size: 12px; color: var(--color-text-secondary); }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.profile-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
.profile-row:last-child { border-bottom: none; }
.profile-key { color: var(--color-text-secondary); }
.profile-val { font-weight: 500; color: var(--color-text-primary); }
.bar-wrap { margin-bottom: 8px; }
.bar-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--color-text-secondary); margin-bottom: 3px; }
.bar-bg { background: var(--color-background-secondary); border-radius: 3px; height: 7px; }
.bar-fill { height: 7px; border-radius: 3px; transition: width 0.4s; }
</style>

<div class="dash">
  <h2 style="font-size:16px; font-weight:500; color:var(--color-text-primary); margin-bottom:4px;">AeroFit customer analysis</h2>
  <p style="font-size:13px; color:var(--color-text-secondary); margin-bottom:1.25rem;">180 customers · 3 treadmill models</p>

  <div class="filter-row">
    <span class="filter-label">Product:</span>
    <button class="pill active" onclick="setFilter('product','All')">All</button>
    <button class="pill" onclick="setFilter('product','KP281')">KP281</button>
    <button class="pill" onclick="setFilter('product','KP481')">KP481</button>
    <button class="pill" onclick="setFilter('product','KP781')">KP781</button>
    <span class="filter-label" style="margin-left:8px;">Gender:</span>
    <button class="pill active" onclick="setFilter('gender','All')">All</button>
    <button class="pill" onclick="setFilter('gender','Male')">Male</button>
    <button class="pill" onclick="setFilter('gender','Female')">Female</button>
  </div>

  <div class="metric-grid" id="metrics"></div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">Product share</div>
      <div class="legend" id="prod-legend"></div>
      <div style="position:relative;height:200px;"><canvas id="prodChart" role="img" aria-label="Doughnut chart of product share by model"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Age distribution by product</div>
      <div class="legend" id="age-legend"></div>
      <div style="position:relative;height:200px;"><canvas id="ageChart" role="img" aria-label="Bar chart of age distribution"></canvas></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">Income vs miles (scatter)</div>
      <div class="legend" id="scatter-legend"></div>
      <div style="position:relative;height:220px;"><canvas id="scatterChart" role="img" aria-label="Scatter plot of income vs miles per week"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Usage frequency distribution</div>
      <div style="position:relative;height:220px;"><canvas id="usageChart" role="img" aria-label="Bar chart of usage frequency"></canvas></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">Gender split by product</div>
      <div style="position:relative;height:200px;"><canvas id="genderChart" role="img" aria-label="Stacked bar chart of gender by product"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Fitness level distribution</div>
      <div style="position:relative;height:200px;"><canvas id="fitnessChart" role="img" aria-label="Bar chart of fitness levels"></canvas></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:1.5rem;">
    <div class="card-title">Product profiles</div>
    <div id="profiles"></div>
  </div>
</div>

const COLORS = { KP281: '#378ADD', KP481: '#1D9E75', KP781: '#D85A30' };
const state = { product: 'All', gender: 'All' };
let charts = {};

function filtered() {
  return RAW.filter(r =>
    (state.product === 'All' || r.Product === state.product) &&
    (state.gender === 'All' || r.Gender === state.gender)
  );
}

function avg(arr, key) {
  if (!arr.length) return 0;
  return arr.reduce((s,r) => s + r[key], 0) / arr.length;
}

function setFilter(type, val) {
  state[type] = val;
  document.querySelectorAll(`.pill`).forEach(b => {
    const t = b.getAttribute('onclick');
    if (t && t.includes(`'${type}'`)) b.classList.toggle('active', t.includes(`'${val}'`));
  });
  render();
}

function render() {
  const data = filtered();
  renderMetrics(data);
  renderProdChart(data);
  renderAgeChart(data);
  renderScatter(data);
  renderUsage(data);
  renderGender(data);
  renderFitness(data);
  renderProfiles(data);
}

function renderMetrics(data) {
  const el = document.getElementById('metrics');
  if (!data.length) { el.innerHTML = '<p style="color:var(--color-text-secondary);font-size:13px;">No data for selection.</p>'; return; }
  const maleP = Math.round(data.filter(r=>r.Gender==='Male').length/data.length*100);
  el.innerHTML = `
    <div class="metric"><div class="metric-label">Customers</div><div class="metric-value">${data.length}</div></div>
    <div class="metric"><div class="metric-label">Avg age</div><div class="metric-value">${avg(data,'Age').toFixed(1)}</div></div>
    <div class="metric"><div class="metric-label">Avg income</div><div class="metric-value">$${Math.round(avg(data,'Income')/1000)}k</div></div>
    <div class="metric"><div class="metric-label">Avg miles/wk</div><div class="metric-value">${Math.round(avg(data,'Miles'))}</div><div class="metric-sub">${maleP}% male</div></div>
  `;
}

function makeOrUpdate(id, config) {
  if (charts[id]) { charts[id].destroy(); }
  const ctx = document.getElementById(id);
  if (ctx) charts[id] = new Chart(ctx, config);
}

function renderProdChart(data) {
  const counts = { KP281: 0, KP481: 0, KP781: 0 };
  data.forEach(r => counts[r.Product]++);
  const labels = Object.keys(counts);
  const vals = Object.values(counts);
  const total = vals.reduce((a,b)=>a+b,0);
  const el = document.getElementById('prod-legend');
  el.innerHTML = labels.map((l,i) => `<span class="legend-item"><span class="legend-dot" style="background:${Object.values(COLORS)[i]}"></span>${l} ${total?Math.round(vals[i]/total*100):0}%</span>`).join('');
  makeOrUpdate('prodChart', {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals, backgroundColor: Object.values(COLORS), borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '60%' }
  });
}

function renderAgeChart(data) {
  const bins = ['18-24','25-29','30-34','35-39','40+'];
  const getBin = age => age<=24?0:age<=29?1:age<=34?2:age<=39?3:4;
  const prods = ['KP281','KP481','KP781'];
  const counts = prods.map(() => Array(5).fill(0));
  data.forEach(r => { const bi = prods.indexOf(r.Product); if(bi>=0) counts[bi][getBin(r.Age)]++; });
  const el = document.getElementById('age-legend');
  el.innerHTML = prods.map((p,i) => `<span class="legend-item"><span class="legend-dot" style="background:${COLORS[p]}"></span>${p}</span>`).join('');
  makeOrUpdate('ageChart', {
    type: 'bar',
    data: { labels: bins, datasets: prods.map((p,i) => ({ label: p, data: counts[i], backgroundColor: COLORS[p] })) },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { stacked: true, ticks: { font: { size: 11 } } }, y: { stacked: true, ticks: { font: { size: 11 } } } } }
  });
}

function renderScatter(data) {
  const prods = ['KP281','KP481','KP781'];
  const el = document.getElementById('scatter-legend');
  el.innerHTML = prods.map(p => `<span class="legend-item"><span class="legend-dot" style="background:${COLORS[p]}"></span>${p}</span>`).join('');
  const datasets = prods.map(p => ({
    label: p,
    data: data.filter(r=>r.Product===p).map(r=>({x:r.Income, y:r.Miles})),
    backgroundColor: COLORS[p] + 'aa', pointRadius: 4, pointHoverRadius: 6
  }));
  makeOrUpdate('scatterChart', {
    type: 'scatter',
    data: { datasets },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: 'Income ($)', font: { size: 11 } }, ticks: { callback: v => '$'+Math.round(v/1000)+'k', font: { size: 10 } } },
        y: { title: { display: true, text: 'Miles/wk', font: { size: 11 } }, ticks: { font: { size: 10 } } }
      }
    }
  });
}

function renderUsage(data) {
  const counts = {};
  data.forEach(r => { counts[r.Usage] = (counts[r.Usage]||0)+1; });
  const labels = Object.keys(counts).sort((a,b)=>+a-+b);
  makeOrUpdate('usageChart', {
    type: 'bar',
    data: { labels: labels.map(l=>'×'+l+'/wk'), datasets: [{ label: 'Customers', data: labels.map(l=>counts[l]), backgroundColor: '#378ADD' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 11 } } }, y: { ticks: { font: { size: 11 } } } } }
  });
}

function renderGender(data) {
  const prods = ['KP281','KP481','KP781'];
  const male = prods.map(p => data.filter(r=>r.Product===p&&r.Gender==='Male').length);
  const female = prods.map(p => data.filter(r=>r.Product===p&&r.Gender==='Female').length);
  makeOrUpdate('genderChart', {
    type: 'bar',
    data: { labels: prods, datasets: [
      { label: 'Male', data: male, backgroundColor: '#378ADD' },
      { label: 'Female', data: female, backgroundColor: '#D4537E' }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, labels: { font: { size: 11 }, boxWidth: 10 } } }, scales: { x: { stacked: true, ticks: { font: { size: 11 } } }, y: { stacked: true, ticks: { font: { size: 11 } } } } }
  });
}

function renderFitness(data) {
  const counts = [1,2,3,4,5].map(f => data.filter(r=>r.Fitness===f).length);
  makeOrUpdate('fitnessChart', {
    type: 'bar',
    data: { labels: ['1 (low)','2','3','4','5 (high)'], datasets: [{ data: counts, backgroundColor: ['#F09595','#FAC775','#5DCAA5','#85B7EB','#378ADD'] }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 11 } } }, y: { ticks: { font: { size: 11 } } } } }
  });
}

function renderProfiles(data) {
  const prods = ['KP281','KP481','KP781'];
  const el = document.getElementById('profiles');
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">` +
    prods.map(p => {
      const d = data.filter(r=>r.Product===p);
      if (!d.length) return `<div style="padding:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);"><p style="font-size:13px;font-weight:500;color:var(--color-text-primary);">${p}</p><p style="font-size:12px;color:var(--color-text-secondary);">No data</p></div>`;
      const maleP = Math.round(d.filter(r=>r.Gender==='Male').length/d.length*100);
      const partneredP = Math.round(d.filter(r=>r.MaritalStatus==='Partnered').length/d.length*100);
      const color = COLORS[p];
      return `<div style="padding:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);">
        <p style="font-size:13px;font-weight:500;color:${color};margin-bottom:8px;">${p} <span style="font-size:11px;color:var(--color-text-secondary);font-weight:400;">${d.length} customers</span></p>
        <div class="profile-row"><span class="profile-key">Avg age</span><span class="profile-val">${avg(d,'Age').toFixed(1)}</span></div>
        <div class="profile-row"><span class="profile-key">Avg income</span><span class="profile-val">$${Math.round(avg(d,'Income')/1000)}k</span></div>
        <div class="profile-row"><span class="profile-key">Avg miles/wk</span><span class="profile-val">${Math.round(avg(d,'Miles'))}</span></div>
        <div class="profile-row"><span class="profile-key">Avg fitness</span><span class="profile-val">${avg(d,'Fitness').toFixed(1)}/5</span></div>
        <div class="profile-row"><span class="profile-key">Male</span><span class="profile-val">${maleP}%</span></div>
        <div class="profile-row"><span class="profile-key">Partnered</span><span class="profile-val">${partneredP}%</span></div>
      </div>`;
    }).join('') + `</div>`;
}

render();
</script>
