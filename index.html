<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AeroFit Analytics Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9}
.header{padding:20px;background:#111827;color:white}
.container{padding:20px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.card{background:white;padding:15px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.chart{background:white;margin-top:15px;padding:10px;border-radius:12px}
select{padding:8px;margin-right:10px}
</style>
</head>
<body>
<div class="header"><h1>AeroFit Customer Analytics Dashboard</h1></div>
<div class="container">
<p><b>Place aerofit_treadmill.csv in the same GitHub folder as this file.</b></p>

<select id="product"><option value="All">All Products</option></select>

<div class="kpis">
<div class="card"><h3>Customers</h3><h2 id="cust">-</h2></div>
<div class="card"><h3>Avg Income</h3><h2 id="inc">-</h2></div>
<div class="card"><h3>Avg Miles</h3><h2 id="miles">-</h2></div>
<div class="card"><h3>Avg Fitness</h3><h2 id="fit">-</h2></div>
</div>

<div id="pie" class="chart"></div>
<div id="age" class="chart"></div>
<div id="income" class="chart"></div>
<div id="scatter" class="chart"></div>

</div>

<script>
let raw=[];

Papa.parse("aerofit_treadmill.csv",{
download:true,
header:true,
complete:(r)=>{
raw=r.data.filter(x=>x.Product);
[...new Set(raw.map(x=>x.Product))].forEach(p=>{
document.getElementById('product').innerHTML += `<option>${p}</option>`;
});
document.getElementById('product').addEventListener('change',render);
render();
}
});

function render(){
let p=document.getElementById('product').value;
let df=raw.filter(x=>p==="All"||x.Product===p);

document.getElementById('cust').innerText=df.length;

const avg=(c)=>df.reduce((a,b)=>a+(+b[c]||0),0)/df.length;

document.getElementById('inc').innerText='₹'+avg('Income').toFixed(0);
document.getElementById('miles').innerText=avg('Miles').toFixed(0);
document.getElementById('fit').innerText=avg('Fitness').toFixed(1);

let counts={};
df.forEach(r=>counts[r.Product]=(counts[r.Product]||0)+1);

Plotly.newPlot('pie',[{
labels:Object.keys(counts),
values:Object.values(counts),
type:'pie'
}],{title:'Product Market Share'});

Plotly.newPlot('age',[{
x:df.map(x=>+x.Age),
type:'histogram'
}],{title:'Age Distribution'});

let products=[...new Set(df.map(x=>x.Product))];
let traces=products.map(prod=>({
type:'box',
name:prod,
y:df.filter(x=>x.Product===prod).map(x=>+x.Income)
}));

Plotly.newPlot('income',traces,{title:'Income by Product'});

Plotly.newPlot('scatter',[{
x:df.map(x=>+x.Usage),
y:df.map(x=>+x.Miles),
mode:'markers',
text:df.map(x=>x.Product)
}],{
title:'Usage vs Miles',
xaxis:{title:'Usage'},
yaxis:{title:'Miles'}
});
}
</script>
</body>
</html>
